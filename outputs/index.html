<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Songboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0D0D0D; color: #fff; overflow: hidden;
}

/* ── Landing ─────────────────────────────────────────── */
#landing {
  display: flex; align-items: flex-start; justify-content: flex-start;
  min-height: 100vh; padding: 56px 64px;
  transition: opacity 0.4s ease; overflow-y: auto;
}
#landing.fade-out { opacity: 0; pointer-events: none; }

/* No card — layout is open, full-bleed dark page */
.card {
  background: none; border: none;
  padding: 0; width: 100%; max-width: 560px; text-align: left;
}

/* ── Logo ─────────────────────────────────────────────── */
.logo-lockup {
  position: relative;
  margin-bottom: 36px; padding: 8px 0 0;
  display: flex; flex-direction: column; align-items: flex-start;
  overflow: visible;
}
/* Logo image — save as logo.png alongside songboard.html */
.logo-image {
  display: block; width: 420px; max-width: 100%;
  margin-left: -32px; /* nudge left to align with form fields */
}
/* Typographic fallback (shown when logo.png is missing) */
.logo-line {
  display: block; font-family: 'Libre Caslon Display', Georgia, serif;
  font-size: 96px; font-weight: 400;
  letter-spacing: -3px; line-height: 0.88;
  color: #fff; text-transform: capitalize; user-select: none;
  
}
.logo-rule {
  width: 100%; height: 1px; background: rgba(255,255,255,0.2); margin: 14px 0 12px;
  
}
.logo-eyebrow {
  font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.38);
  letter-spacing: 3px; text-transform: uppercase; 
}

.card h1 { font-size: 15px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.2px; color: #fff; }
.card .sub { font-size: 13px; color: rgba(255,255,255,0.38); margin-bottom: 28px; line-height: 1.55; }

.field { text-align: left; margin-bottom: 12px; }
.field label {
  display: block; font-size: 10px; font-weight: 700;
  color: rgba(255,255,255,0.38); text-transform: uppercase;
  letter-spacing: 1.4px; margin-bottom: 7px;
}
.field input, .field select {
  width: 100%; background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.18); border-radius: 4px;
  padding: 11px 14px; color: #fff; font-size: 14px;
  font-family: inherit; font-weight: 500;
  outline: none; transition: border-color 0.2s;
  -webkit-appearance: none; appearance: none;
}
.field input:focus, .field select:focus { border-color: rgba(255,255,255,0.6); }
.field input::placeholder { color: rgba(255,255,255,0.22); }
.field.error input, .field.error select { border-color: rgba(226,75,74,0.75); }
.field select option { background: #111; color: #fff; }

.join-btn {
  width: 100%; padding: 13px; background: #fff; color: #000;
  border: none; border-radius: 4px; font-size: 12px; font-weight: 700;
  font-family: inherit; letter-spacing: 1.2px; text-transform: uppercase;
  cursor: pointer; margin-top: 6px; transition: background 0.15s, transform 0.1s;
}
.join-btn:hover { background: rgba(255,255,255,0.88); }
.join-btn:active { transform: scale(0.99); }
.join-btn:disabled { opacity: 0.45; cursor: default; }

.spotify-row { margin-top: 18px; display: flex; align-items: center; justify-content: flex-start; gap: 8px; }
#spotify-btn {
  background: none; border: none; color: rgba(255,255,255,0.3); font-size: 12px;
  font-family: inherit; cursor: pointer;
  text-decoration: underline; text-underline-offset: 3px; padding: 0;
  transition: color 0.2s;
}
#spotify-btn:hover { color: rgba(255,255,255,0.6); }
.spotify-note { font-size: 12px; color: rgba(255,255,255,0.2); }

/* ── Autocomplete ────────────────────────────────────── */
.ac-wrap { position: relative; }
.ac-list {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 200;
  background: #1a1a1a; border: 1px solid rgba(255,255,255,0.18);
  border-radius: 4px; margin-top: 4px; overflow: hidden; display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.ac-list.open { display: block; }
.ac-item {
  padding: 10px 14px; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.055); transition: background 0.12s;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.active { background: rgba(255,255,255,0.09); }
.ac-track  { font-size: 13px; font-weight: 600; color: #fff; }
.ac-artist { font-size: 12px; color: rgba(255,255,255,0.42); margin-top: 1px; }

.count-hint { margin-top: 16px; font-size: 12px; color: rgba(255,255,255,0.28); letter-spacing: 0.2px; text-align: left; }
.count-hint strong { color: rgba(255,255,255,0.5); }

/* ── Board ───────────────────────────────────────────── */
#board { display: none; position: fixed; inset: 0; opacity: 0; transition: opacity 0.5s ease; }
#board.visible { opacity: 1; }
#canvas { display: block; position: fixed; top: 0; left: 0; }

/* Top bar */
#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 22px 28px; display: flex; align-items: center;
  justify-content: space-between; z-index: 40; pointer-events: none;
}
.tl { color: rgba(255,255,255,0.3); font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 700; }
.tr { display: flex; gap: 10px; align-items: center; pointer-events: all; }
.top-btn-danger { color: rgba(255,100,100,0.75) !important; }
.top-btn-danger:hover { color: #ff6464 !important; }
/* ── Genre×Dept chart panel ───────────────────────────────────── */
#chart-panel {
  position: fixed; right: 0; top: 0; bottom: 0; width: 250px;
  background: rgba(10,10,10,0.82); backdrop-filter: blur(14px);
  border-left: 1px solid rgba(255,255,255,0.07);
  padding: 70px 16px 20px; overflow-y: auto;
  z-index: 39; display: none;
}
#board.visible #chart-panel { display: block; }
.cp-title {
  font-size: 9px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: rgba(255,255,255,0.25);
  margin-bottom: 18px;
}
.cp-dept {
  margin-bottom: 14px;
}
.cp-dept-name {
  font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
  text-transform: uppercase; color: rgba(255,255,255,0.35);
  margin-bottom: 6px;
}
.cp-dots {
  display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 5px;
}
.cp-dot {
  width: 10px; height: 10px; border-radius: 50%;
  flex-shrink: 0; cursor: default;
  transition: transform 0.15s;
}
.cp-dot:hover { transform: scale(1.6); }
.cp-genre-row {
  display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px;
}
.cp-genre-pill {
  font-size: 9px; font-weight: 600; padding: 2px 6px;
  border-radius: 20px; letter-spacing: 0.3px;
  opacity: 0.8;
}
.cp-divider {
  height: 1px; background: rgba(255,255,255,0.06);
  margin: 10px 0 14px;
}
.cp-toggle {
  display: flex; align-items: center; gap: 5px;
  font-size: 9px; color: rgba(255,255,255,0.25);
  cursor: pointer; margin-top: 7px; user-select: none;
  transition: color 0.15s;
}
.cp-toggle:hover { color: rgba(255,255,255,0.5); }
.cp-toggle-arrow {
  font-size: 8px; transition: transform 0.2s;
  display: inline-block;
}
.cp-toggle.open .cp-toggle-arrow { transform: rotate(90deg); }
.cp-people {
  display: none; margin-top: 7px;
  border-left: 1px solid rgba(255,255,255,0.08);
  padding-left: 9px;
}
.cp-people.open { display: block; }
.cp-person {
  padding: 4px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.cp-person:last-child { border-bottom: none; }
.cp-person-name {
  font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.65);
  line-height: 1.3;
}
.cp-person-song {
  font-size: 9px; color: rgba(255,255,255,0.3);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 185px;
}
.cp-empty {
  font-size: 12px; color: rgba(255,255,255,0.2); margin-top: 20px; text-align: center;
}

#confirm-modal {
  display: none; position: fixed; inset: 0; z-index: 300;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
}
#confirm-modal.open { display: flex; }
.confirm-card {
  background: #181818; border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; padding: 32px 36px; max-width: 360px; width: 90%;
  text-align: center;
}
.confirm-card p { color: rgba(255,255,255,0.75); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
.confirm-card h3 { color: #fff; font-size: 15px; font-weight: 700; margin-bottom: 10px; }
.confirm-btns { display: flex; gap: 10px; }
.confirm-btns button { flex: 1; padding: 11px; border: none; border-radius: 5px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; }
.btn-no  { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }
.btn-yes { background: #ff4444; color: #fff; }
.top-btn {
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 100px; padding: 8px 17px; color: rgba(255,255,255,0.65);
  font-size: 12px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: background 0.2s; letter-spacing: 0.3px;
}
.top-btn:hover { background: rgba(255,255,255,0.14); }
#count-label { font-size: 12px; color: rgba(255,255,255,0.28); pointer-events: none; }

/* Tooltip */
#tooltip {
  position: fixed; display: none; pointer-events: none;
  background: rgba(10,10,10,0.96); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px; padding: 13px 16px; min-width: 178px;
  backdrop-filter: blur(16px); z-index: 60;
}
.tt-name   { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 2px; }
.tt-dept   { font-size: 11px; color: rgba(255,255,255,0.38); margin-bottom: 7px; letter-spacing: 0.3px; }
.tt-song   { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 2px; }
.tt-artist { font-size: 12px; color: rgba(255,255,255,0.38); margin-bottom: 9px; }
.tt-genre  { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }

/* Add modal */
#modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.82); backdrop-filter: blur(10px);
  z-index: 100; align-items: center; justify-content: center;
}
#modal.open { display: flex; }
.modal-card {
  background: #000; border: 1px solid #fff;
  border-radius: 6px; padding: 36px; width: 440px; max-width: 90vw;
  color: #fff;
}
.modal-card h2 { font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; color: #fff; }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.btn-cancel { flex: 1; padding: 12px; background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5); border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit; }
.btn-add    { flex: 2; padding: 12px; background: #fff; color: #000; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 700; font-family: inherit; letter-spacing: 1px; text-transform: uppercase; }
.btn-add:hover { background: rgba(255,255,255,0.88); }

/* Toast */
#toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(16px);
  background: #000; border: none;
  border-radius: 100px; padding: 10px 22px;
  font-size: 12px; font-weight: 600; letter-spacing: 0.3px; color: #fff;
  opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; z-index: 200;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

<script>
// ─────────────────────────────────────────────────────────────────
// SPOTIFY SETUP
// 1. Go to https://developer.spotify.com/dashboard and create an app.
// 2. Add this page's URL as a Redirect URI in your app settings.
//    (If hosting locally, use e.g. http://localhost:5500/songboard.html)

const SPOTIFY_CLIENT_ID = '9d8eda14b8e241c3b7570736da2b4dc5';
const SPOTIFY_REDIRECT  = location.origin + location.pathname;

let spotifyToken = null;

// PKCE helpers
async function sha256(plain) {
  return crypto.subtle.digest('SHA-256', new TextEncoder().encode(plain));
}
function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function randStr(n) {
  const a = new Uint8Array(n);
  crypto.getRandomValues(a);
  return Array.from(a, b => b.toString(36)).join('').slice(0, n);
}

async function connectSpotify() {
  if (SPOTIFY_CLIENT_ID === 'YOUR_CLIENT_ID_HERE') {
    alert('Paste your Spotify Client ID into the code first — see the comment near the top of the <script> block.');
    return;
  }
  // Save form state before redirect (it will be lost during OAuth)

async function handleSpotifyCallback() {
  const code = new URLSearchParams(location.search).get('code');
  if (!code) return;
  history.replaceState(null, '', location.pathname + location.hash);
  const verifier = sessionStorage.getItem('pkce_verifier');
  if (!verifier) return;
  try {
    const res  = await fetch('https://accounts.spotify.com/api/token', {
      method:  'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body:    new URLSearchParams({
        client_id: SPOTIFY_CLIENT_ID, grant_type: 'authorization_code',
        code, redirect_uri: SPOTIFY_REDIRECT, code_verifier: verifier,
      }),
    });
    const data = await res.json();
    if (data.access_token) {
      spotifyToken = data.access_token;
      setSpotifyConnected();
    }
  } catch(e) {}
  sessionStorage.removeItem('pkce_verifier');
  // Restore form state
  try {
    const saved = JSON.parse(sessionStorage.getItem('sb_form') || '{}');
    if (saved.name)  document.getElementById('l-name').value   = saved.name;
    if (saved.song)  document.getElementById('l-song').value   = saved.song;
    if (saved.artist)document.getElementById('l-artist').value = saved.artist;
    if (saved.dept)  document.getElementById('l-dept').value   = saved.dept;
    sessionStorage.removeItem('sb_form');
  } catch(e) {}
}

// ── Spotify search (used for autocomplete + BPM lookup) ──────────
async function spotifySearch(query, limit = 5) {
  if (!spotifyToken) return [];
  try {
    const q = encodeURIComponent(query);
    const res = await fetch(
      `https://api.spotify.com/v1/search?q=${q}&type=track&limit=${limit}`,
      { headers: { Authorization: 'Bearer ' + spotifyToken } }
    );
    if (!res.ok) return [];
    const d = await res.json();
    return (d.tracks?.items || []).map(t => ({
      id:         t.id,
      name:       t.name,
      artist:     t.artists?.[0]?.name || '',
      previewUrl: t.preview_url || null,
    }));
  } catch(e) { return []; }
}

// ── BPM detection from 30s audio preview ─────────────────────────
async function detectBPMFromPreview(url) {
  if (!url) return null;
  try {
    const res = await fetch(url);
    if (!res.ok) return null;
    const buf = await res.arrayBuffer();
    const tmpCtx = new (window.AudioContext || window.webkitAudioContext)();
    const decoded = await tmpCtx.decodeAudioData(buf);
    tmpCtx.close();

    const ch  = decoded.getChannelData(0);
    const sr  = decoded.sampleRate;
    const hop = Math.round(sr * 0.01); // 10ms windows

    // Energy envelope
    const env = [];
    for (let i = 0; i + hop <= ch.length; i += hop) {
      let e = 0;
      for (let j = 0; j < hop; j++) e += ch[i + j] * ch[i + j];
      env.push(Math.sqrt(e / hop));
    }

    // Autocorrelation over BPM range 60–200
    const minLag = Math.round(60 / (200 * 0.01));
    const maxLag = Math.round(60 / (60  * 0.01));
    let best = minLag, bestVal = -1;
    for (let p = minLag; p <= maxLag; p++) {
      let acc = 0;
      const n = env.length - p;
      for (let i = 0; i < n; i++) acc += env[i] * env[i + p];
      const val = acc / n;
      if (val > bestVal) { bestVal = val; best = p; }
    }
    return Math.round(60 / (best * 0.01));
  } catch(e) { return null; }
}

// ── Get BPM + previewUrl: audio-features first, then preview analysis ──
async function getSpotifyData(song, artist) {
  if (!spotifyToken) return { bpm: null, previewUrl: null };
  try {
    const tracks = await spotifySearch(`${song} ${artist}`, 1);
    if (!tracks.length) return { bpm: null, previewUrl: null };
    const { id, previewUrl } = tracks[0];

    // Try audio-features (works for older/approved apps)
    const af = await fetch(`https://api.spotify.com/v1/audio-features/${id}`,
      { headers: { Authorization: 'Bearer ' + spotifyToken } });
    if (af.ok) {
      const d = await af.json();
      if (typeof d.tempo === 'number') return { bpm: d.tempo, previewUrl };
    }

    // Fall back: detect BPM from 30s preview audio
    const bpm = await detectBPMFromPreview(previewUrl);
    return { bpm, previewUrl };
  } catch(e) { return { bpm: null, previewUrl: null }; }
}

// ── Landing dot animation ──────────────────────────────────────────
(function() {
  const canvas = document.getElementById('dot-canvas');
  const ctx    = canvas.getContext('2d');
  const COLORS = ['#FFFF00','#FF5533','#00FFFF','#00FF00'];
  const R        = 5.5;
  const GRAV     = 0.05;
  const BOUNCE   = 0.82;
  const MAX_SPD  = 3.5;     // velocity ceiling so gravity can't build up indefinitely
  const HISTORY  = 90;
  const HIT_R    = R * 5;   // cursor interaction radius
  let W, H, running = true;
  let mx = -9999, my = -9999;

  // Track cursor via window (canvas has pointer-events:none)
  window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

  // Triangular offsets → tight near head, spread at tail
  const OFFSETS = [];
  for (let i = 0, s = 0; s < HISTORY; i++) { OFFSETS.push(s); s += i + 1; }

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function mkBall(color) {
    // Wider speed range — some drift slowly, some zip
    const spd  = 0.3 + Math.pow(Math.random(), 0.7) * 2.8;
    const ang  = Math.random() * Math.PI * 2;
    const gDir = Math.random() * Math.PI * 2;
    const gSpd = 0.003 + Math.random() * 0.005;
    return {
      x: R + Math.random() * (W - 2*R),
      y: R + Math.random() * (H - 2*R),
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      gDir, gSpd,
      color, hist: []
    };
  }

  const balls = COLORS.flatMap(c => [mkBall(c), mkBall(c), mkBall(c)]);

  function frame() {
    if (!running) { ctx.clearRect(0,0,W,H); return; }
    ctx.clearRect(0,0,W,H);

    for (const b of balls) {
      // Rotating per-ball gravity
      b.gDir += b.gSpd;
      b.vx   += Math.cos(b.gDir) * GRAV;
      b.vy   += Math.sin(b.gDir) * GRAV;

      // Cursor repulsion — push ball away when cursor is close
      const cdx = b.x - mx, cdy = b.y - my;
      const cdist = Math.sqrt(cdx*cdx + cdy*cdy);
      if (cdist < HIT_R && cdist > 0) {
        const force = (HIT_R - cdist) / HIT_R * 2.5;
        b.vx += (cdx / cdist) * force;
        b.vy += (cdy / cdist) * force;
      }

      // Speed cap — prevents gravity from accelerating balls off screen over time
      const spd = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
      if (spd > MAX_SPD) { b.vx = b.vx/spd * MAX_SPD; b.vy = b.vy/spd * MAX_SPD; }

      b.x += b.vx; b.y += b.vy;

      // Wall bounces + hard clamp so fast-moving balls can never escape
      if (b.x < R)   { b.vx =  Math.abs(b.vx) * BOUNCE; }
      if (b.x > W-R) { b.vx = -Math.abs(b.vx) * BOUNCE; }
      if (b.y < R)   { b.vy =  Math.abs(b.vy) * BOUNCE; }
      if (b.y > H-R) { b.vy = -Math.abs(b.vy) * BOUNCE; }
      b.x = Math.max(R, Math.min(W-R, b.x));
      b.y = Math.max(R, Math.min(H-R, b.y));

      b.hist.push({ x: b.x, y: b.y });
      if (b.hist.length > HISTORY) b.hist.shift();

      const n = b.hist.length;
      for (let i = 0; i < OFFSETS.length; i++) {
        const off = OFFSETS[i];
        if (off >= n) break;
        ctx.globalAlpha = (1 - off / HISTORY) * 0.85;
        ctx.fillStyle   = b.color;
        ctx.beginPath();
        ctx.arc(b.hist[n - 1 - off].x, b.hist[n - 1 - off].y, R, 0, 6.283);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(frame);
  }
  frame();

  // Stop when landing fades out
  const landing = document.getElementById('landing');
  new MutationObserver(() => {
    running = !landing.classList.contains('fade-out');
    if (running) frame();
  }).observe(landing, { attributes: true, attributeFilter: ['class'] });
})();

// ─────────────────────────────────────────────────────────────────
// Genre config — f is bounce frequency in Hz, a is visual amplitude.
// When real Spotify BPM is available, f = bpm / 60 instead.
// ─────────────────────────────────────────────────────────────────
// Genre → base speed (px/s). Faster = more energetic genre.
const GENRE_SPEED = {
  Classical:  45,
  Jazz:       55,
  Country:    60,
  'R&B':      70,
  Indie:      75,
  Pop:        85,
  'Hip-Hop':  95,
  Rock:      110,
  Electronic:125,
  Metal:     145,
  Other:      70,
};

// Dept → hue offset (degrees). Blended with genre hue to produce ball colour.
// All outputs are forced bright/saturated before use.
const DEPT_HUE = {
  Engineering:     200,
  Product:         260,
  Design:           15,
  Marketing:       330,
  Sales:            45,
  'Customer Success': 160,
  Finance:         210,
  Operations:      280,
  People:          350,
  Leadership:       90,
  Other:           180,
};

const GENRE_HUE = {
  Classical:   220,
  Jazz:         35,
  Country:      80,
  'R&B':        10,
  Indie:       165,
  Pop:         310,
  'Hip-Hop':   270,
  Rock:          0,
  Electronic:  170,
  Metal:       350,
  Other:       200,
};

function genreDeptColor(genre, dept) {
  const gh = GENRE_HUE[genre]  ?? 200;
  const dh = DEPT_HUE[dept]    ?? 180;
  // Average the two hues (wrap-aware)
  let diff = ((dh - gh + 540) % 360) - 180;
  const h = (gh + diff * 0.45 + 360) % 360;
  // Always full saturation, high lightness → bright neon-ish colours
  return `hsl(${Math.round(h)},100%,60%)`;
}

// ─────────────────────────────────────────────────────────────────
// Canvas
// ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let W, H, DPR;
const flashes = []; // { x, y, age, c } — wall hit gradients
let balls = [];

function resizeCanvas() {
  DPR = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width  = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  // Lock CSS size to viewport so retina screens don't blow the canvas up
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const topbarH = document.getElementById('topbar').offsetHeight || 60;
  balls.forEach(b => {
    b.x = Math.min(Math.max(b.x, b.r), W - b.r - 250);
    b.y = Math.min(Math.max(b.y, topbarH + b.r), H - b.r);
  });
}

// ─────────────────────────────────────────────────────────────────
// Ball — 90s screensaver physics
// ─────────────────────────────────────────────────────────────────
class Ball {
  constructor(entry) {
    this.name   = entry.name;
    this.song   = entry.song;
    this.artist = entry.artist;
    this.genre  = entry.genre;
    this.dept   = entry.dept || '';
    this.bpm    = entry.bpm || null;
    this.previewUrl = entry.previewUrl || null;
    this.audio  = null; // lazy audio element for hover preview
    this.c      = genreDeptColor(entry.genre, entry.dept || '');
    this.r      = 14 + Math.random() * 8;  // smaller balls
    this.x      = this.r + Math.random() * (W - this.r * 2);
    this.y      = this.r + Math.random() * (H - this.r * 2);
    const baseSpd = GENRE_SPEED[entry.genre] || 70;
    const spd   = baseSpd * (0.75 + Math.random() * 0.5); // ±25% variation
    const ang   = Math.random() * Math.PI * 2;
    this.vx     = Math.cos(ang) * spd;
    this.vy     = Math.sin(ang) * spd;
    this.ph     = Math.random() * Math.PI * 2;
  }

  step(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;

    // Boundaries: keep balls inside visible area, below topbar, left of chart panel
    const topbarH = document.getElementById('topbar').offsetHeight || 60;
    const maxX = W - this.r - 250;
    const minX = this.r;
    const maxY = H - this.r;
    const minY = topbarH + this.r;

    // Wall bounce — flash uses complementary color of the ball
    if (this.x < minX) {
      this.vx = Math.abs(this.vx);
      flashes.push({ x: 0, y: this.y, age: 0, c: complementary(this.c) });
    }
    if (this.x > maxX) {
      this.vx = -Math.abs(this.vx);
      flashes.push({ x: W - 250, y: this.y, age: 0, c: complementary(this.c) });
    }
    if (this.y < minY) {
      this.vy = Math.abs(this.vy);
      flashes.push({ x: this.x, y: 0, age: 0, c: complementary(this.c) });
    }
    if (this.y > maxY) {
      this.vy = -Math.abs(this.vy);
      flashes.push({ x: this.x, y: H, age: 0, c: complementary(this.c) });
    }

    // Hard clamp — balls can never escape bounds even at high speed
    this.x = Math.max(minX, Math.min(maxX, this.x));
    this.y = Math.max(minY, Math.min(maxY, this.y));
  }

  draw(t, hot) {
    // Solid ball — no aura/gradient
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, 6.283);
    ctx.fillStyle = this.c;
    ctx.fill();

    // Hover ring
    if (hot) {
      ctx.strokeStyle = 'rgba(255,255,255,0.75)';
      ctx.lineWidth   = 2;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r + 4, 0, 6.283);
      ctx.stroke();
    }

    // Name label
    ctx.font      = '600 11px "Space Grotesk", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.72)';
    ctx.fillText(this.name, this.x, this.y - this.r - 7);
  }

  hit(mx, my) {
    return (mx - this.x) ** 2 + (my - this.y) ** 2 <= (this.r + 8) ** 2;
  }
}

// ─────────────────────────────────────────────────────────────────
// Animation loop
// ─────────────────────────────────────────────────────────────────
function hexToRgba(c, a) {
  if (c.startsWith('hsl')) {
    return c.replace('hsl(', 'hsla(').replace(')', `,${+a.toFixed(3)})`);
  }
  const r = parseInt(c.slice(1,3),16);
  const g = parseInt(c.slice(3,5),16);
  const b = parseInt(c.slice(5,7),16);
  return `rgba(${r},${g},${b},${+a.toFixed(3)})`;
}

// Complementary color — rotate hue 180° for HSL, invert RGB for hex
function complementary(c) {
  if (c.startsWith('hsl')) {
    return c.replace(/hsl\((\d+)/, (_, h) => `hsl(${(+h + 180) % 360}`);
  }
  const r = (255 - parseInt(c.slice(1,3),16)).toString(16).padStart(2,'0');
  const g = (255 - parseInt(c.slice(3,5),16)).toString(16).padStart(2,'0');
  const b = (255 - parseInt(c.slice(5,7),16)).toString(16).padStart(2,'0');
  return `#${r}${g}${b}`;
}

let mx = -999, my = -999, prev = null;
let prevHotKey = null; // for hover-audio tracking

function loop(ts) {
  const t  = ts / 1000;
  const dt = prev ? Math.min(t - prev, 0.05) : 0;
  prev = t;

  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.fillStyle = '#0D0D0D';
  ctx.fillRect(0, 0, W, H);

  // Wall hit gradient flashes
  for (let i = flashes.length - 1; i >= 0; i--) {
    const f = flashes[i];
    f.age += dt;
    const p = f.age / 1.4;
    if (p >= 1) { flashes.splice(i, 1); continue; }
    const ease   = 1 - (1 - p) * (1 - p); // ease-out
    const radius = 18 + 240 * ease;
    const alpha  = (1 - p) * 0.42;
    const grad   = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, radius);
    grad.addColorStop(0,   hexToRgba(f.c, alpha));
    grad.addColorStop(0.45,hexToRgba(f.c, alpha * 0.35));
    grad.addColorStop(1,   hexToRgba(f.c, 0));
    ctx.beginPath();
    ctx.arc(f.x, f.y, radius, 0, 6.283);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // Balls
  let hot = null;
  balls.forEach(b => { b.step(dt); if (b.hit(mx, my)) hot = b; });
  balls.forEach(b => b.draw(t, b === hot));

  // Tooltip
  const tip = document.getElementById('tooltip');
  if (hot) {
    document.getElementById('tt-name').textContent   = hot.name;
    document.getElementById('tt-song').textContent   = '♪ ' + hot.song;
    document.getElementById('tt-artist').textContent = hot.artist;
    const tg = document.getElementById('tt-genre');
    tg.textContent = hot.bpm ? `${hot.genre} · ${Math.round(hot.bpm)} BPM` : hot.genre;
    tg.style.background = hot.c + '28';
    tg.style.color      = hot.c;
    const td = document.getElementById('tt-dept');
    if (hot.dept) { td.textContent = hot.dept; td.style.display = 'block'; }
    else          { td.style.display = 'none'; }
    tip.style.display = 'block';
    tip.style.left = Math.min(mx + 14, W - 205) + 'px';
    tip.style.top  = Math.max(Math.min(my - 12, H - 128), 10) + 'px';
  } else {
    tip.style.display = 'none';
  }

  // Hover audio — play 30s preview when mouse enters a ball
  const hotKey = hot ? `${hot.name}|${hot.song}` : null;
  if (hotKey !== prevHotKey) {
    // Stop whatever was playing
    balls.forEach(b => { if (b.audio && !b.audio.paused) { b.audio.pause(); b.audio.currentTime = 0; } });
    if (hot && hot.previewUrl) {
      if (!hot.audio) {
        hot.audio = new Audio(hot.previewUrl);
        hot.audio.volume = 0.55;
        hot.audio.loop   = false;
      }
      hot.audio.currentTime = 0;
      hot.audio.play().catch(() => {}); // silently ignore autoplay policy blocks
    }
    prevHotKey = hotKey;
  }

  requestAnimationFrame(loop);
}

canvas.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
canvas.addEventListener('mouseleave', () => { mx = -999; my = -999; });
window.addEventListener('resize', resizeCanvas);

// ─────────────────────────────────────────────────────────────────
// Screen transition
// ─────────────────────────────────────────────────────────────────
function updateChart() {
  const body = document.getElementById('cp-body');
  if (!body) return;
  if (!entries.length) {
    body.innerHTML = '<div class="cp-empty">No songs yet.</div>';
    return;
  }

  // Group: dept → [ entry, … ]
  const deptMap = {};
  entries.forEach(e => {
    const d = e.dept || 'Other';
    if (!deptMap[d]) deptMap[d] = [];
    deptMap[d].push(e);
  });

  // Sort depts by count desc
  const depts = Object.keys(deptMap).sort((a,b) => deptMap[b].length - deptMap[a].length);

  body.innerHTML = depts.map(dept => {
    const people = deptMap[dept];

    // Genre counts within this dept
    const genreCounts = {};
    people.forEach(p => { genreCounts[p.genre] = (genreCounts[p.genre]||0)+1; });

    const dots = people.map(p => {
      const col = genreDeptColor(p.genre, p.dept || '');
      return `<div class="cp-dot" style="background:${col}" title="${p.name} · ${p.genre}"></div>`;
    }).join('');

    const pills = Object.entries(genreCounts)
      .sort((a,b)=>b[1]-a[1])
      .map(([g,n]) => {
        const col = genreDeptColor(g, dept);
        return `<span class="cp-genre-pill" style="background:${col}22;color:${col}">${g} ${n}</span>`;
      }).join('');

    const peopleRows = people.map(p => {
      const col = genreDeptColor(p.genre, p.dept || '');
      return `<div class="cp-person">
        <div class="cp-person-name" style="color:${col}">${p.name}</div>
        <div class="cp-person-song">♪ ${p.song}${p.artist ? ' — ' + p.artist : ''}</div>
      </div>`;
    }).join('');

    const deptId = 'dept-' + dept.replace(/\s+/g,'_');

    return `<div class="cp-dept">
      <div class="cp-dept-name">${dept}</div>
      <div class="cp-dots">${dots}</div>
      <div class="cp-genre-row">${pills}</div>
      <div class="cp-toggle" onclick="toggleDept('${deptId}',this)">
        <span class="cp-toggle-arrow">▶</span>
        <span>${people.length} ${people.length === 1 ? 'person' : 'people'}</span>
      </div>
      <div class="cp-people" id="${deptId}">${peopleRows}</div>
    </div><div class="cp-divider"></div>`;
  }).join('');
}

function toggleDept(id, btn) {
  const panel = document.getElementById(id);
  if (!panel) return;
  panel.classList.toggle('open');
  btn.classList.toggle('open');
}


function showBoard() {
  const landing = document.getElementById('landing');
  const board   = document.getElementById('board');
  landing.classList.add('fade-out');
  setTimeout(() => {
    landing.style.display = 'none';
    board.style.display   = 'block';
    resizeCanvas();
    balls = entries.map(e => new Ball(e));
    updateChart();
    requestAnimationFrame(() => {
      board.classList.add('visible');
      requestAnimationFrame(loop);
    });
    const n = entries.length;
    document.getElementById('count-label').textContent = `${n} ${n === 1 ? 'song' : 'songs'}`;
  }, 370);
}

// ─────────────────────────────────────────────────────────────────
// Landing
// ─────────────────────────────────────────────────────────────────
document.getElementById('join-btn').addEventListener('click', submitLanding);
['l-name','l-song','l-artist'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') submitLanding();
  });
});

async function submitLanding() {
  const name   = document.getElementById('l-name').value.trim();
  const song   = document.getElementById('l-song').value.trim();
  const artist = document.getElementById('l-artist').value.trim();
  const genre  = document.getElementById('l-genre').value;
  const dept   = document.getElementById('l-dept').value;

  let valid = true;
  [['l-name','field-name'],['l-song','field-song'],['l-artist','field-artist']].forEach(([inp, fld]) => {
    const ok = !!document.getElementById(inp).value.trim();
    document.getElementById(fld).classList.toggle('error', !ok);
    if (!ok) valid = false;
  });
  if (!valid) return;

  const btn = document.getElementById('join-btn');
  let bpm = null, previewUrl = null;
  if (spotifyToken) {
    btn.textContent = 'Detecting BPM…';
    btn.disabled    = true;
    ({ bpm, previewUrl } = await getSpotifyData(song, artist));
    btn.textContent = 'Join the board →';
    btn.disabled    = false;
  }

  const entry = { name, song, artist, genre, dept, bpm, previewUrl };
  if (window._fbDb) {
    window._fbDb.ref('entries').push(entry);
  } else {
    entries.push(entry);
  }
  showBoard();
  if (bpm) toast(`♪ ${Math.round(bpm)} BPM detected`);
}

// ─────────────────────────────────────────────────────────────────
// Modal
// ─────────────────────────────────────────────────────────────────
function openModal()  { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

async function submitModal() {
  const name   = document.getElementById('m-name').value.trim();
  const song   = document.getElementById('m-song').value.trim();
  const artist = document.getElementById('m-artist').value.trim();
  const genre  = document.getElementById('m-genre').value;
  const dept   = document.getElementById('m-dept').value;
  if (!name || !song || !artist) return;

  const addBtn = document.querySelector('.btn-add');
  let bpm = null, previewUrl = null;
  if (spotifyToken) {
    addBtn.textContent = 'Detecting BPM…';
    addBtn.disabled = true;
    ({ bpm, previewUrl } = await getSpotifyData(song, artist));
    addBtn.textContent = 'Add to board';
    addBtn.disabled = false;
  }

  const entry = { name, song, artist, genre, dept, bpm, previewUrl };
  if (window._fbDb) {
    window._fbDb.ref('entries').push(entry);
    // Real-time listener will add ball + update chart
  } else {
    entries.push(entry);
    balls.push(new Ball(entry));
    updateChart();
    const n = entries.length;
    document.getElementById('count-label').textContent = `${n} songs`;
  }
  ['m-name','m-song','m-artist'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('m-dept').value = '';
  closeModal();
  if (bpm) toast(`♪ ${Math.round(bpm)} BPM detected`);
}

// ─────────────────────────────────────────────────────────────────
// Share
// ─────────────────────────────────────────────────────────────────
function shareBoard() {
  navigator.clipboard.writeText(location.href).then(() => toast('Link copied to clipboard'));
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ─────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────
updateCountHint();
handleSpotifyCallback();
</script>

<!-- Firebase SDK (compat v9) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
(function() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.database();
    window._fbDb = db;

    // ── Real-time listener ──────────────────────────────────────
    // Fires once on load (all existing entries) then on every change
    db.ref('entries').on('value', snapshot => {
      const data = snapshot.val() || {};
      const newEntries = Object.values(data);

      // Rebuild entries + balls from scratch on every sync
      entries = newEntries;
      const boardVisible = document.getElementById('board').classList.contains('visible');

      if (boardVisible) {
        // Add balls only for entries that don't have one yet
        const existingNames = new Set(balls.map(b => b.name + '|' + b.song));
        newEntries.forEach(e => {
          if (!existingNames.has(e.name + '|' + e.song)) {
            balls.push(new Ball(e));
          }
        });
        // Remove balls for entries that were deleted
        balls = balls.filter(b => newEntries.some(e => e.name === b.name && e.song === b.song));
        updateChart();
        const n = entries.length;
        document.getElementById('count-label').textContent = `${n} ${n === 1 ? 'song' : 'songs'}`;
      }
    });

    console.log('Songboard: Firebase connected ✓');
  } catch(e) {
    console.error('Songboard: Firebase init failed:', e);
    loadEntries();
  }
})();
</script>
