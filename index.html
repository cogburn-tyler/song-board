body {

  background: #0D0D0D; color: #fff; overflow: hidden;

/* ── Landing ─────────────────────────────────────────── */
#landing {
  display: flex; align-items: flex-start; justify-content: flex-start;
  min-height: 100vh; padding: 56px 64px;
  transition: opacity 0.4s ease; overflow-y: auto;
}
#landing.fade-out { opacity: 0; pointer-events: none; }

/* No card — layout is open, full-bleed dark page */
.card {
  background: none; border: none;
  padding: 0; width: 100%; max-width: 560px; text-align: left;
}
